function renderTabla(){
  const tbody = document.getElementById('equiposTbody');
  tbody.innerHTML = '';
  equipos.forEach((eq,i)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="color:#888;text-align:center">${i+1}</td>
      <td><input value="${eq.codigo}" oninput="equipos[${i}].codigo=this.value;guardarLista()"></td>
      <td><input value="${eq.nombre}" oninput="equipos[${i}].nombre=this.value;guardarLista()"></td>
      <td><button class="del-btn" onclick="eliminarEquipo(${i})">✕</button></td>`;
    tbody.appendChild(tr);
  });
}

function agregarEquipo(){
  const n = equipos.length+1;
  equipos.push({codigo:'EQ'+String(n).padStart(3,'0'),nombre:'Nuevo Equipo '+n});
  guardarLista(); renderTabla();
}

function eliminarEquipo(i){ equipos.splice(i,1); guardarLista(); renderTabla(); }
function guardarLista(){ try{localStorage.setItem('lab_equipos_list',JSON.stringify(equipos));}catch(e){} }

function generarTodos(){
  const urlBase = document.getElementById('urlBase').value.trim();
  if(!urlBase){
    const st = document.getElementById('status');
    st.textContent = '⚠️ Por favor ingresa la URL base del formulario primero.';
    st.style.color = '#c0392b';
    document.getElementById('qrGrid').innerHTML = '';
    document.getElementById('qrTitulo').style.display = 'none';
    return;
  }
  const size = parseInt(document.getElementById('qrSize').value);
  const grid = document.getElementById('qrGrid');
  grid.innerHTML = '';
  document.getElementById('qrTitulo').style.display = '';

  equipos.forEach(eq => {
    const url = urlBase + '?equipo=' + encodeURIComponent(eq.codigo) + '&nombre=' + encodeURIComponent(eq.nombre);

    const card = document.createElement('div');
    card.className = 'qr-card';

    const qrCenter = document.createElement('div');
    qrCenter.style.cssText = 'display:flex;justify-content:center;margin-bottom:8px;';
    const qrWrapper = document.createElement('div');
    qrWrapper.style.cssText = 'display:inline-block;position:relative;';
    qrCenter.appendChild(qrWrapper);
    card.appendChild(qrCenter);

    const codigoDiv = document.createElement('div');
    codigoDiv.className = 'qr-codigo';
    codigoDiv.textContent = eq.codigo;
    card.appendChild(codigoDiv);

    const nombreDiv = document.createElement('div');
    nombreDiv.className = 'qr-nombre';
    nombreDiv.textContent = eq.nombre;
    card.appendChild(nombreDiv);

    const urlDiv = document.createElement('div');
    urlDiv.className = 'qr-url';
    urlDiv.textContent = url;
    card.appendChild(urlDiv);

    grid.appendChild(card);

    try {
      new QRCode(qrWrapper, {
        text: url,
        width: size,
        height: size,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });

      setTimeout(() => {
        const logoSize = Math.round(size * 0.25);
        const logoImg = document.createElement('img');
        logoImg.src = LOGO_URL;
        logoImg.style.cssText = 'position:absolute;width:'+logoSize+'px;height:'+logoSize+'px;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:3px;background:white;padding:2px;pointer-events:none;object-fit:contain;';
        qrWrapper.appendChild(logoImg);
      }, 200);
    } catch(e) {
      qrWrapper.textContent = '⚠️ Error QR';
    }
  });

  const st = document.getElementById('status');
  st.style.color = '#27ae60';
  st.textContent = '✓ ' + equipos.length + ' códigos QR generados correctamente.';
}

renderTabla();
</script>
